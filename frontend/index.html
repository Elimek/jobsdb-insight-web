<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JobsDB Insight - 岗位竞争分析</title>
<script src="config.js" defer></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; }

.header { background:linear-gradient(135deg,#1e293b,#0f172a); border-bottom:1px solid #1e293b; padding:32px 20px; text-align:center; }
.header h1 { font-size:32px; background:linear-gradient(135deg,#60a5fa,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.header p { color:#64748b; font-size:14px; margin-top:4px; }

.container { max-width:720px; margin:0 auto; padding:20px; }

/* Main search */
.search-card { background:linear-gradient(135deg,#1e293b,#1a2332); border-radius:20px; padding:32px; margin-bottom:20px; border:1px solid #263548; }
.search-card h2 { font-size:15px; color:#94a3b8; font-weight:400; margin-bottom:12px; }
.search-row { display:flex; gap:10px; }
.search-row input { flex:1; background:#0f172a; border:2px solid #263548; border-radius:12px; padding:16px 20px; font-size:16px; color:#e2e8f0; outline:none; transition:all .2s; }
.search-row input:focus { border-color:#60a5fa; box-shadow:0 0 0 3px rgba(96,165,250,0.15); }
.search-row input::placeholder { color:#475569; }
.search-row button { background:linear-gradient(135deg,#60a5fa,#3b82f6); border:none; border-radius:12px; padding:16px 32px; font-size:16px; font-weight:600; color:#fff; cursor:pointer; transition:all .2s; white-space:nowrap; }
.search-row button:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(96,165,250,0.3); }
.search-row button:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }
.hint { font-size:12px; color:#475569; margin-top:10px; }
.hint code { background:#1e293b; padding:2px 6px; border-radius:4px; font-size:11px; color:#64748b; }

/* Result */
.result { display:none; background:#1e293b; border-radius:16px; padding:28px; margin-bottom:16px; }
.result.show { display:block; }
.result-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:20px; }
.result-title { font-size:20px; font-weight:600; }
.result-title small { display:block; color:#94a3b8; font-size:13px; font-weight:400; margin-top:3px; }
.result-id { font-size:11px; color:#475569; }
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.metric { text-align:center; padding:20px; border-radius:14px; }
.metric.applicants { background:linear-gradient(135deg,rgba(96,165,250,0.12),rgba(167,139,250,0.12)); }
.metric.resume { background:linear-gradient(135deg,rgba(52,211,153,0.12),rgba(16,185,129,0.12)); }
.metric.cover { background:linear-gradient(135deg,rgba(251,191,36,0.12),rgba(245,158,11,0.12)); }
.metric-value { font-size:40px; font-weight:700; line-height:1; }
.metric.applicants .metric-value { background:linear-gradient(135deg,#60a5fa,#a78bfa); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.metric.resume .metric-value { color:#34d399; }
.metric.cover .metric-value { color:#fbbf24; }
.metric-label { font-size:13px; color:#94a3b8; margin-top:8px; }
.competition-line { margin-top:20px; padding-top:16px; border-top:1px solid #263548; display:flex; justify-content:space-between; align-items:center; }
.competition-line span { font-size:13px; color:#64748b; }
.badge { display:inline-block; padding:6px 20px; border-radius:20px; font-size:14px; font-weight:600; }
.badge.high { background:rgba(248,113,113,0.15); color:#f87171; }
.badge.mid { background:rgba(251,191,36,0.15); color:#fbbf24; }
.badge.low { background:rgba(52,211,153,0.15); color:#34d399; }

/* Error */
.error-box { display:none; background:rgba(248,113,113,0.08); border:1px solid rgba(248,113,113,0.15); border-radius:12px; padding:16px; margin-bottom:12px; color:#f87171; font-size:14px; }
.error-box.show { display:block; }

/* Loading */
.loading { display:none; text-align:center; padding:40px; }
.loading.show { display:block; }
.spinner { width:36px; height:36px; border:3px solid #1e293b; border-top:3px solid #60a5fa; border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 10px; }
@keyframes spin { to { transform:rotate(360deg); } }

.footer { text-align:center; padding:20px; color:#475569; font-size:12px; }
.footer a { color:#60a5fa; text-decoration:none; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 JobsDB Insight</h1>
  <p>贴入岗位链接 · 秒查竞争数据</p>
</div>

<div class="container">

  <div class="search-card">
    <h2>👋 贴入 JobsDB 岗位链接</h2>
    <div class="search-row">
      <input type="text" id="urlInput" placeholder="https://hk.jobsdb.com/job/91640131" autocomplete="off">
      <button id="searchBtn" onclick="search()">🔍 查询</button>
    </div>
    <div class="hint">支持 URL 或 8 位岗位 ID · 如 <code>91640131</code></div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div style="color:#64748b;font-size:14px;">查询中...</div>
  </div>

  <div class="result" id="result">
    <div class="result-header">
      <div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-id" id="resultId"></div>
      </div>
    </div>
    <div class="metrics">
      <div class="metric applicants">
        <div class="metric-value" id="mApps">—</div>
        <div class="metric-label">总申请人数</div>
      </div>
      <div class="metric resume">
        <div class="metric-value" id="mResume">—</div>
        <div class="metric-label">附简历</div>
      </div>
      <div class="metric cover">
        <div class="metric-value" id="mCover">—</div>
        <div class="metric-label">Cover Letter</div>
      </div>
    </div>
    <div class="competition-line">
      <span>竞争程度</span>
      <span class="badge" id="badge"></span>
    </div>
  </div>

</div>

<div class="footer">
  <a href="https://github.com/Elimek/jobsdb-insight-web" target="_blank">GitHub</a> · 
  需要有效的 JobsDB 登录会话
</div>

<script>
function getJobId(input) {
  input = input.trim();
  // Full URL
  let m = input.match(/\/job\/(\d{8})/);
  if (m) return m[1];
  // Just ID
  if (/^\d{8}$/.test(input)) return input;
  return null;
}

function showError(msg) {
  const el = document.getElementById('errorBox');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

function setLoading(v) {
  document.getElementById('loading').classList.toggle('show', v);
  document.getElementById('searchBtn').disabled = v;
}

function badge(level) {
  if (level === 'low') return ['🟢 竞争较低', 'low'];
  if (level === 'mid') return ['🟡 竞争中等', 'mid'];
  if (level === 'high') return ['🔴 竞争激烈', 'high'];
  return ['⚪ 暂无数据', 'low'];
}

async function search() {
  const id = getJobId(document.getElementById('urlInput').value);
  if (!id) { showError('请输入有效的 JobsDB 岗位链接或 ID'); return; }
  
  document.getElementById('result').classList.remove('show');
  setLoading(true);
  
  try {
    const resp = await fetch(`${API_URL}/api/job?id=${id}`);
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({detail: resp.statusText}));
      throw new Error(err.detail || `服务器错误 (${resp.status})`);
    }
    const d = await resp.json();
    
    if (d.applicants === null && d.resume_pct === null) {
      showError('该岗位暂无竞争数据');
      setLoading(false);
      return;
    }
    
    document.getElementById('resultTitle').innerHTML = `${d.title || '岗位'} <small>${d.company || ''}</small>`;
    document.getElementById('resultId').textContent = `#${d.id}`;
    document.getElementById('mApps').textContent = d.applicants !== null ? d.applicants.toLocaleString() : '—';
    document.getElementById('mResume').textContent = d.resume_pct !== null ? `${d.resume_pct}%` : '—';
    document.getElementById('mCover').textContent = d.cover_pct !== null ? `${d.cover_pct}%` : '—';
    
    let level = 'na';
    if (d.applicants > 200) level = 'high';
    else if (d.applicants > 50) level = 'mid';
    else if (d.applicants !== null) level = 'low';
    
    const [label, cls] = badge(level);
    const el = document.getElementById('badge');
    el.textContent = label;
    el.className = `badge ${cls}`;
    
    document.getElementById('result').classList.add('show');
  } catch (e) {
    showError(e.message);
  } finally { setLoading(false); }
}

document.getElementById('urlInput').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });
</script>
</body>
</html>
